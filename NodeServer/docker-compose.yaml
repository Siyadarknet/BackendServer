version: "3.8"

services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: libretranslate
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=en,hi    
      - LT_UPDATE_MODELS=true
    volumes:
      - C:/libretranslate/data:/home/libretranslate/.local/share
      - C:/libretranslate/db:/app/db
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/languages || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
