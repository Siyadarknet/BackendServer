name: Keep Render Backends Awake

on:
  schedule:
    # Runs every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch: # allows manual trigger from Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ML Server
        run: |
          curl -s https://sofia-ml.onrender.com/ || echo "ML server ping failed"

      - name: Ping Node Server
        run: |
          curl -s https://sofia-node.onrender.com/ || echo "Node server ping failed"
